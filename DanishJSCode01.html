<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>F1 Drivers Gallery</title>

<style>

/* ===== BODY ===== */
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#e5e7eb;
    margin:0;
}

/* ===== HEADER ===== */
header{
    background:#1e3a8a;
    color:white;
    padding:15px 20px;
    font-size:24px;
    font-weight:bold;
}

/* ===== CONTAINER ===== */
.container{
    width:900px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* ===== FEATURED IMAGE ===== */
#featured{
    position:relative;
}

#featured img{
    width:100%;
    height:400px;
    object-fit:cover;
    border-radius:5px;
}

/* ===== CAPTION ===== */
figcaption{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:rgba(255,255,255,0.7);
    padding:15px;
    font-size:20px;
    font-weight:bold;
    color:#111;
    border-radius:0 0 5px 5px;
    opacity:0;
    transition:0.5s;
}

/* ===== THUMBNAILS ===== */
#thumbnails{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
}

#thumbnails img{
    width:150px;
    height:90px;
    object-fit:cover;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
    border:3px solid transparent;
}

/* hover thumbnail */
#thumbnails img:hover{
    transform:scale(1.05);
    border:3px solid #1e3a8a;
}

</style>

</head>

<body>

<header>
F1 Drivers Gallery
</header>

<div class="container">

<!-- FEATURED -->
<figure id="featured">
    <img src="verstappen.avif" title="Max Verstappen - Red Bull Racing">
    <figcaption></figcaption>
</figure>

<!-- THUMBNAILS -->
<div id="thumbnails">

    <img src="cs55.jpg" title="Carlos Sainz - Williams">
    <img src="lh44.jpg" title="Lewis Hamilton - Mercedes">
    <img src="cs16.jpg" title="Charles Leclerc - Ferrari">
    <img src="lando.jpg" title="Lando Norris - McLaren">

</div>

</div>

<script>

// bila page load
window.addEventListener("load", function() {

    var thumbs = document.getElementById("thumbnails");

    // CLICK THUMBNAIL
    thumbs.addEventListener("click", function (e) {

        if (e.target.tagName === "IMG") {

            var featuredImage = document.querySelector("#featured img");

            // tukar gambar
            featuredImage.src = e.target.src;

            // tukar title
            featuredImage.title = e.target.title;

        }

    });

    var featured = document.getElementById("featured");

    // MOUSE OVER (show caption)
    featured.addEventListener("mouseover", function () {

        var caption = document.querySelector("#featured figcaption");

        caption.style.opacity = 1;
        caption.innerHTML = document.querySelector("#featured img").title;

    });

    // MOUSE OUT (hide caption)
    featured.addEventListener("mouseout", function () {

        var caption = document.querySelector("#featured figcaption");

        caption.style.opacity = 0;

    });

});

</script>

</body>
</html>
