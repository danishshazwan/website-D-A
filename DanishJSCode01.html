<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F1 Drivers Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#d1d5db;
}

/* ===== HEADER ===== */
header{
    background:#1e3a8a;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-family:'Lobster', cursive;
    margin:0;
}

.hamburger{
    font-size:24px;
}

/* ===== MAIN CONTAINER ===== */
.container{
    width:900px;
    margin:30px auto;
    background:white;
    padding:15px;
    border:1px solid #ccc;
}

/* ===== FEATURED ===== */
#featured{
    position:relative;
}

#featured img{
    width:100%;
    height:400px;
    object-fit:cover;
}

/* ===== CAPTION ===== */
#featured figcaption{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:rgba(255,255,255,0.7);
    padding:15px;
    font-size:20px;
    text-align:center;
    font-weight:bold;
}

/* ===== THUMBNAILS ===== */
#thumbnails{
    margin-top:15px;
    display:flex;
    gap:10px;
}

#thumbnails img{
    width:160px;
    height:90px;
    object-fit:cover;
    cursor:pointer;
    border:4px solid #eee;
    transition:0.3s;
}

/* hover effect */
#thumbnails img:hover{
    border:4px solid #1e3a8a;
}

</style>

</head>

<body>

<header>
    <h1>F1 Drivers Gallery</h1>
    <div class="hamburger">&#9776;</div>
</header>

<div class="container">

<figure id="featured">
    <img src="verstappen.avif" title="Max Verstappen - Red Bull Racing">
    <figcaption>Max Verstappen - Red Bull Racing</figcaption>
</figure>

<div id="thumbnails">
    <img src="verstappen.avif" title="Max Verstappen - Red Bull Racing">
    <img src="lh44.jpg" title="Lewis Hamilton - Mercedes">
    <img src="cs16.jpg" title="Charles Leclerc - Ferrari">
    <img src="lando.jpg" title="Lando Norris - McLaren">
    <img src="cs55.jpg" title="Carlos Sainz - Williams">
</div>

</div>

<script>

// CLICK THUMBNAIL
document.getElementById("thumbnails").addEventListener("click", function(e){

    if(e.target.tagName === "IMG"){

        let featured = document.querySelector("#featured img");
        let caption = document.querySelector("#featured figcaption");

        featured.src = e.target.src;
        featured.title = e.target.title;

        caption.innerHTML = e.target.title;
    }

});

</script>

</body>
</html>
