<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Storage - Tetapan Tema</title>
    <style>
        body { transition: 0.3s; font-family: sans-serif; }
        a { color: inherit; margin-right: 15px; cursor: pointer; text-decoration: underline; }
        .dark-mode { background-color: #222; color: #fff; } 
    </style>
</head>
<body>

    <h1>Tetapan Paparan</h1>
    <a id="toggle" class="toggle">Mode Gelap</a>

    <script>
        const btnToggle = document.getElementById('toggle');

        // --- THEME LOGIC ---
        const applyDarkMode = () => {
            document.body.classList.add('dark-mode');
            btnToggle.innerHTML = 'Mode Terang';
            localStorage.setItem('tema', 'dark');
        };

        const applyLightMode = () => {
            document.body.classList.remove('dark-mode');
            btnToggle.innerHTML = 'Mode Gelap';
            localStorage.setItem('tema', 'light');
        };

        // Check preference on initial load
        let tema = localStorage.getItem('tema');
        if (tema === 'dark') applyDarkMode();

        btnToggle.addEventListener('click', (e) => {
            e.preventDefault(); // Prevents page jump
            tema = localStorage.getItem('tema');
            if (tema === 'dark') {
                applyLightMode();
            } else {
                applyDarkMode();
            }
        });
    </script>
</body>
</html>
