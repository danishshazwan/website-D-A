<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1.0,maximum-scale=1.0,width=device-width">

<title>Shopping Cart</title>

<style>
@import url(http://fonts.googleapis.com/css?family=Roboto:400,500,700,300,100);

body {
  background-color: #F5F5F5;
  font-family: "Roboto", helvetica, arial, sans-serif;
}

div.title {
  margin: auto;
  max-width: 900px;
  padding:5px;
}

.title h1 {
   color: black;
   font-size: 26px;
   font-weight: 500;
   text-transform:uppercase;
}

.table-fill {
  background: white;
  border-radius:3px;
  border-collapse: collapse;
  margin: auto;
  max-width: 900px;
  width: 100%;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}
 
th {
  color: white;
  background: #EF6C00;
  font-size:20px;
  padding:20px;
  text-align:left;
}
  
tr {
  border-top:1px solid #C1C3D1;
}

td {
  padding:10px;
  font-size:18px;
  border-right:1px solid #C1C3D1;
}

td:last-child{
border-right:none;
}

tr.totals td{
background:#FFF3E0;
text-align:right;
}

td.right{ text-align:right; }
td.center{ text-align:center; }

.focus td{
color:#E65100;
font-weight:500;
}

img{
width:80px;
}

button{
  padding:4px 10px;
  margin:2px;
  cursor:pointer;
  border:none;
  background:#EF6C00;
  color:white;
  border-radius:4px;
}

button:hover{
  background:#e65100;
}
</style>

</head>

<body>

<div class="title">
<h1>Shopping Cart</h1>
</div>

<table class="table-fill">

<thead>
<tr>
<th colspan="2">Product</th>
<th>#</th>
<th>Price</th>
<th>Amount</th>
</tr>
</thead>

<tbody>

<script>
// ===== DATA =====
var filenames = ["106020.jpg","116010.jpg","120010.jpg"];
var titles = [
"Girl with a Pearl Earring",
"Artist Holding a Thistle",
"Portrait of Eleanor of Toledo"
];
var quantities = [3,1,2];
var prices = [80,125,75];

// ===== SETTINGS =====
const tax_rate = 0.10;
const shipping_threshold = 1000;

var subtotal = 0;
var tax = 0;
var shipping = 0;
var grand = 0;

// ===== FUNCTIONS =====
function calculateTotal(q,p){ return q*p; }
function calculateTax(s,r){ return s*r; }
function calculateShipping(s,t){ return (s>t)?0:40; }
function calculateGrandTotal(s,t,sh){ return s+t+sh; }

// OUTPUT ROW (ADA BUTTON + -)
function outputCartRow(file,title,quantity,price,total,index){
document.write("<tr>");

document.write("<td><img src='"+file+"'></td>");
document.write("<td>"+title+"</td>");

document.write("<td class='center'>");
document.write("<button onclick='decrease("+index+")'>-</button>");
document.write("<span id='qty-"+index+"'> "+quantity+" </span>");
document.write("<button onclick='increase("+index+")'>+</button>");
document.write("</td>");

document.write("<td class='right'>$"+price.toFixed(2)+"</td>");
document.write("<td class='right' id='total-"+index+"'>$"+total.toFixed(2)+"</td>");

document.write("</tr>");
}

// ===== MAIN LOOP =====
for (var i=0; i<titles.length; i++){
let total = calculateTotal(quantities[i], prices[i]);
subtotal += total;

outputCartRow(
filenames[i],
titles[i],
quantities[i],
prices[i],
total,
i
);
}

tax = calculateTax(subtotal, tax_rate);
shipping = calculateShipping(subtotal, shipping_threshold);
grand = calculateGrandTotal(subtotal, tax, shipping);

// ===== BUTTON FUNCTION =====
function increase(i){
    quantities[i]++;
    updateRow(i);
}

function decrease(i){
    if(quantities[i] > 0){
        quantities[i]--;
        updateRow(i);
    }
}

// UPDATE SEMUA
function updateRow(i){

    let newTotal = quantities[i] * prices[i];

    document.getElementById("qty-"+i).innerText = quantities[i];
    document.getElementById("total-"+i).innerText = "$"+newTotal.toFixed(2);

    subtotal = 0;
    for(let j=0;j<quantities.length;j++){
        subtotal += quantities[j]*prices[j];
    }

    tax = calculateTax(subtotal, tax_rate);
    shipping = calculateShipping(subtotal, shipping_threshold);

    if(subtotal === 0){
        grand = 0;
        shipping = 0;
    } else {
        grand = calculateGrandTotal(subtotal, tax, shipping);
    }

    let totals = document.querySelectorAll("tr.totals td:last-child");

    totals[0].innerText = "$"+subtotal.toFixed(2);
    totals[1].innerText = "$"+tax.toFixed(2);
    totals[2].innerText = "$"+shipping.toFixed(2);
    totals[3].innerText = "$"+grand.toFixed(2);
}
</script>

<tr class="totals">
<td colspan="4">Subtotal</td>
<td>$<span id="subtotal"><script>document.write(subtotal.toFixed(2))</script></span></td>
</tr>

<tr class="totals">
<td colspan="4">Tax</td>
<td>$<span id="tax"><script>document.write(tax.toFixed(2))</script></span></td>
</tr>

<tr class="totals">
<td colspan="4">Shipping</td>
<td>$<span id="shipping"><script>document.write(shipping.toFixed(2))</script></span></td>
</tr>

<tr class="totals focus">
<td colspan="4">Grand Total</td>
<td>$<span id="grand"><script>document.write(grand.toFixed(2))</script></span></td>
</tr>

</tbody>
</table>

</body>
</html>
