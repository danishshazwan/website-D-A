<!DOCTYPE html>
<html>
<head>
<title>Share Your Travels</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Poppins', sans-serif;
    margin:0;
    background:#dcdcdc;
}

/* HEADER */

header{
    background:#3f51b5;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
    font-size:28px;
    font-weight:600;
}

/* hamburger icon */

.menu{
    font-size:28px;
    cursor:pointer;
}

/* MAIN */

main{
    width:800px;
    margin:20px auto;
    background:white;
    padding:10px;
}

/* FEATURED IMAGE */

#featured{
    position:relative;
}

#featured img{
    width:100%;
}

/* caption */

#featured figcaption{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(255,255,255,0.7);
    text-align:center;
    padding:15px;
    font-size:20px;
    opacity:0;
}

/* thumbnails */

#thumbnails{
    margin-top:10px;
    display:flex;
    gap:10px;
}

#thumbnails img{
    width:120px;
    cursor:pointer;
    border:3px solid #ddd;
}

#thumbnails img:hover{
    border:3px solid #3f51b5;
}

</style>

</head>

<body>

<header>
<h1>Share Your Travels</h1>
<div class="menu">☰</div>
</header>

<main>

<figure id="featured">
<img src="images/medium1.jpg" title="Battle">
<figcaption></figcaption>
</figure>

<div id="thumbnails">

<img src="images/small1.jpg" title="Battle">
<img src="images/small2.jpg" title="Village">
<img src="images/small3.jpg" title="Sea">
<img src="images/small4.jpg" title="Temple">
<img src="images/small5.jpg" title="Church">

</div>

</main>

<script>

window.addEventListener("load", function() {

var thumbs = document.getElementById("thumbnails");

thumbs.addEventListener("click", function (e) {

if (e.target.nodeName.toLowerCase() == 'img') {

var clickedImageSource = e.target.src;

var newSrc = clickedImageSource.replace("small", "medium");

var featuredImage = document.querySelector("#featured img");

featuredImage.src = newSrc;

featuredImage.title = e.target.title;

}

});

var featured = document.getElementById("featured");

featured.addEventListener("mouseover", function () {

var caption = document.querySelector("#featured figcaption");

caption.style.transition = "opacity 1.5s";

caption.style.opacity = 0.8;

caption.innerHTML = document.querySelector("#featured img").title;

});

featured.addEventListener("mouseout", function () {

var caption = document.querySelector("#featured figcaption");

caption.style.transition = "opacity 1.5s";

caption.style.opacity = 0;

});

});

</script>

</body>
</html>
