<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://kit.fontawesome.com/659b1009c4.js" crossorigin="anonymous"></script>
<title>Diylas Flower</title>

<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}

body {
    background-color: rgb(98, 30, 104);
    padding: 100px 10% 0 10%;
    font-size: 1.4rem;
    font-family: sans-serif;
    color: white;
}

.utama {
    display: grid;
    grid-template-columns: 2fr 1.2fr;
    column-gap: 30px;
}

.pertama {
    background-color: rgb(182, 77, 192);
    padding: 30px;
    border-radius: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 15px;
    text-align: left;
}

.beli {
    background-color: rgb(210, 118, 233);
    border-radius: 3px;
    padding: 10px 40px;
    border: none;
    cursor: pointer;
    color: white;
}

.kedua {
    background-color: rgb(150, 96, 175);
    padding: 30px;
    border-radius: 5px;
}

.kandungan-kedua {
    display: flex; 
    justify-content: space-between;
    align-items: center; 
    padding: 10px 0;
    margin-bottom: 5px;
}

.teks-kiri {
    flex: 1;
}

.buang {
    background-color: rgb(218, 118, 221);
    border-radius: 4px;
    padding: 8px 15px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.1rem;
    color: white;
}

.jumlah {
    display: flex;
    justify-content: space-between;
    padding-top: 20px;
    margin-top: 20px;
    border-top: 2px solid rgba(255,255,255,0.2); 
}

.bold {
    font-weight: bold;
}
</style>
</head>

<body>

<h1 style="text-align: center; margin-bottom: 20px;">Diylas flower shop</h1>

<div class="utama">
    <div class="pertama">
        <table>
            <tr>
                <th>Barang</th>
                <th>Harga</th>
            </tr>
            <tr>
                <td>Bouquet</td>
                <td>RM 150</td>
                <td><button class="beli" onclick="tambahData({nama: 'Bouquet', harga:150})">
                    <i class="fa-solid fa-cart-shopping"></i> Beli</button></td>
            </tr>
            <tr>
                <td>Crown</td>
                <td>RM 15</td>
                <td><button class="beli" onclick="tambahData({nama: 'Crown', harga:15})">
                    <i class="fa-solid fa-cart-shopping"></i> Beli</button></td>
            </tr>
            <tr>
                <td>Flower</td>
                <td>RM 150</td>
                <td><button class="beli" onclick="tambahData({nama: 'Flower', harga:150})">
                    <i class="fa-solid fa-cart-shopping"></i> Beli</button></td>
            </tr>
            <tr>
                <td>Henna</td>
                <td>RM 100</td>
                <td><button class="beli" onclick="tambahData({nama: 'Henna', harga:100})">
                    <i class="fa-solid fa-cart-shopping"></i> Beli</button></td>
            </tr>
            <tr>
                <td>Lamp</td>
                <td>RM 80</td>
                <td><button class="beli" onclick="tambahData({nama: 'Lamp', harga:80})">
                    <i class="fa-solid fa-cart-shopping"></i> Beli</button></td>
            </tr>
        </table>
    </div>

    <div class="kedua">
        <div id="troli"></div>

        <div class="jumlah">
            <div class="teks-kiri">Jumlah</div>
            <div class="teks-kanan bold">RM 0.00</div>
        </div>
    </div>
</div>

<script>
let data = {};
let hasil = 0;
let troli = document.querySelector("#troli");

function tambahData(dapatkanBarang) {
    let nama = dapatkanBarang.nama;

    if (nama in data) {
        data[nama].jumlah++;
    } else {
        data[nama] = {
            harga: dapatkanBarang.harga,
            jumlah: 1
        };
    }
    kiraHasil();
    renderTroli();
}

function kiraHasil() {
    hasil = 0;
    for (let key in data) {
        hasil += data[key].harga * data[key].jumlah;
    }
    document.querySelector(".bold").innerText = "RM " + hasil.toFixed(2);
}

function renderTroli() {
    kosongkanElemen(troli);

    for (let key in data) {
        let div_container = document.createElement("div");
        div_container.classList.add("kandungan-kedua");

        let div_teks = document.createElement("div");
        div_teks.style.textAlign = "left";
        div_teks.innerHTML = `${key} (${data[key].jumlah}x)`;

        let div_kanan = document.createElement("div");
        
        let butang = document.createElement("button");
        butang.classList.add("buang");
        butang.onclick = function() { buangData(key); };

        let i = document.createElement("i");
        i.classList.add("fas", "fa-trash");

        butang.appendChild(i);
        let span = document.createElement("span");
        span.innerText = " Buang";
        butang.appendChild(span);

        div_kanan.appendChild(butang);

        div_container.appendChild(div_teks);
        div_container.appendChild(div_kanan);
        
        troli.appendChild(div_container);
    }
}

function buangData(namaBarang) {
    if (data[namaBarang].jumlah > 1) {
        data[namaBarang].jumlah--;
    } else {
        delete data[namaBarang];
    }
    kiraHasil();
    renderTroli();
}

function kosongkanElemen(elemen) {
    while (elemen.firstChild) {
        elemen.removeChild(elemen.firstChild);
    }
}
</script>

</body>
</html>
