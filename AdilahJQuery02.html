<!DOCTYPE html>
<html>
<head>
    <title>Tutorial jQuery Diyla</title>
    <script src="jquery-4.0.0.js"></script>

    <style>
        body{
            font-family: Arial;
        }

        .header{
            background-color: rgb(121, 44, 104);
            padding: 25px;
            text-align: center;
            color: rgb(255, 255, 255);
            font-size: 35px;
            font-weight: bold;
        }

        button{
            padding: 8px 15px;
            margin: 10px 5px;
        }

        h1{
            color: hotpink;
        }

        .styleBaru{
            color: blue;
            background: yellow;
        }
    </style>
</head>

<body>

<div class="header">TUTORIAL JQUERY DIYLA</div>

<button id="btnStyle">Ubah Style</button>
<button id="btnText">Ubah Kalimat</button>

<h1 id="judul">Judul Heading 1</h1>

<p id="p1">Kalimat Awal</p>
<p id="p2">Kalimat paragraf ke dua</p>

<input type="text" id="itemBaru" placeholder="Tulis item dan tekan Enter">
<br><br>

<ul id="list">
    <li>Ayam Bakar</li>
    <li>Laksa</li>
    <li>Sambal petai</li>
    <li>Bihun Sup</li>
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
    <li id="target">abcd</li>
</ul>

<br>

<a href="#" id="linkSaya">Ini Link</a>

<script>
$(document).ready(function(){

    $("#btnStyle").click(function(){
        $("#judul").addClass("styleBaru");
    });

    $("#btnText").click(function(){
        $("#p1").text("Kalimat sudah diubah");
    });

    $("#linkSaya").click(function(e){
        e.preventDefault();
        alert("Ini Link telah diklik");
        $(this).text("Link Dah Klik");
    });

    
    $("#itemBaru").keyup(function(e){
        if(e.which == 13){
            e.preventDefault();

            var value = $(this).val();

            if(value !== ""){
                $("#list").prepend("<li>" + value + "</li>");
                $(this).val("");
            }
        }
    });

});
</script>

</body>
</html>
