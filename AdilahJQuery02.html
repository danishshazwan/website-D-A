<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial jQuery-Diyla</title>

<script src="jquery-4.0.0.js"></script>

<style>
body {
    font-size: 16px;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

.header {
    background-color: rgb(121, 44, 104);
    padding: 25px;
    text-align: center;
    color: rgb(255, 255, 255);
}


.container {
    padding: 50px;
    text-align: center;
}


button {
    padding: 12px 24px;
    cursor: pointer;
    margin: 10px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    background-color: rgb(122, 101, 143);
    color: white;
}


#gbr1 {
    position: relative; 
    top: 0;
    left: 0;
    margin-top: 30px;
    width: 200px; 
    border: 5px solid #ffffff;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <h1>TUTORIAL JQUERY DIYLA</h1>
</div>

<div class="container">

    <button id="animasi">Animasi</button>

    <br><br>

    <img id="gbr1" src="scuba.gif">

</div>

<script>
$(document).ready(function(){

    $('#animasi').click(function(){

        $('#gbr1').stop(true);

        $('#gbr1')
        .animate({ top: "+=100px" }, 400)   
        .animate({ left: "+=100px" }, 400)  
        .animate({ top: "-=100px" }, 400)   
        .animate({ left: "-=100px" }, 400)  
        .fadeOut(500); 

    });

});
</script>

</body>
</html>
