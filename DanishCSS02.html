<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Malaysia Auto Store - Customer Registration</title>
<style>
/* --- RESET & LAYOUT --- */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: #333;
    background-color: #f4f4f4;
    line-height: 1.6;
}

/* --- TOP BAR --- */
.top-bar {
    background: #222;
    color: #999;
    padding: 8px 20px;
    text-align: right;
    font-size: 12px;
}
.top-bar a {
    color: #999;
    text-decoration: none;
    margin-left: 15px;
    font-size: 0.9em;
}
.top-bar a:hover { color: white; }

/* --- HEADER --- */
header {
    background: #fff;
    padding: 20px;
    border-bottom: 1px solid #eee;
    text-align: left;
}
header h1 {
    font-size: 32px;
    color: #333;
}

/* --- NAVIGATION --- */
nav {
    background: #f8f8f8;
    border-bottom: 1px solid #ddd;
    padding: 10px 20px;
}
nav a {
    margin-right: 25px;
    text-decoration: none;
    color: #777;
    font-weight: bold;
}
nav a:hover { color: #000; }

/* --- CONTAINER --- */
.container {
    width: 900px;
    margin: 20px auto;
    background-color: #fff;
    border: 1px solid #ddd;
    padding: 30px;
}

/* --- HEADINGS --- */
h2 {
    font-size: 1.8em;
    margin-bottom: 20px;
    color: #333;
}
h3 {
    font-size: 1.2em;
    font-weight: bold;
    margin-bottom: 10px;
    color: #444;
    border-top: 1px solid #eee;
    padding-top: 15px;
}

/* --- FORM ELEMENTS --- */
input[type="text"], input[type="email"], input[type="password"], input[type="date"], select, input[type="color"], input[type="range"] {
    width: 100%;
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 3px;
    margin-bottom: 15px;
    font-size: 14px;
}

/* Color and range inputs styling */
input[type="color"] { height: 30px; width: 50px; padding: 2px; cursor: pointer; }
input[type="range"] { width: 60%; vertical-align: middle; }

/* Labels */
label {
    font-weight: bold;
    margin-bottom: 5px;
    display: block;
}

/* Form rows and groups */
.form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 10px; }
.form-group { flex: 1; display: flex; flex-direction: column; }

/* Radio group */
.radio-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
.radio-group label { font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px; }

/* Checkbox row */
.checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 14px; }
.checkbox-row a { color: blue; text-decoration: none; }
.checkbox-row a:hover { text-decoration: underline; }

/* Button */
.submit-btn {
    background-color: #bddbfa;
    border: 1px solid #a1c4e6;
    padding: 8px 15px;
    font-weight: bold;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}
.submit-btn:hover { background-color: #a3c4e0; }

/* Button icon */
.btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
}

/* Range wrapper */
.range-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; }

/* FOOTER */
footer {
    background-color: #222;
    color: #999;
    text-align: center;
    padding: 15px;
    font-size: 12px;
    border-top: 1px solid #ddd;
    margin-top: 20px;
}

</style>
</head>
<body>

<div class="top-bar">
    <a href="#">My Account</a>
    <a href="#">Wish List</a>
    <a href="#">Shopping Cart</a>
    <a href="#">Checkout</a>
</div>

<header>
    <h1>Malaysia Auto Store</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">Promotions</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <h2>Customer Registration - Proton X50 2024 Booking</h2>

    <form>

        <!-- 1. User Info -->
        <h3>1. User Info</h3>
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="example@email.com">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="at least 8 characters">
            </div>
            <div class="form-group">
                <label>Repeat Password</label>
                <input type="password" placeholder="at least 8 characters">
            </div>
        </div>

        <!-- 2. Location -->
        <h3>2. Location</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Address</label>
                <input type="text">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Zip</label>
                <input type="text">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Phone</label>
                <input type="text" placeholder="01X-XXXXXXX">
            </div>
            <div class="form-group">
                <label>Country</label>
                <select>
                    <option>Malaysia</option>
                    <option>Singapore</option>
                    <option>Thailand</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Region</label>
                <div class="radio-group">
                    <label><input type="radio" name="region"> Northern Malaysia</label>
                    <label><input type="radio" name="region"> Central Malaysia</label>
                    <label><input type="radio" name="region"> Southern Malaysia</label>
                </div>
            </div>
        </div>

        <!-- 3. Personal Details -->
        <h3>3. Personal Details</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Birth Date</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>Preferred Car Color</label>
                <input type="color" value="#000000">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Interest Level (Proton X50)</label>
                <div class="range-wrap">
                    <span>Minimal</span>
                    <input type="range" min="0" max="10" value="5">
                    <span>Love it!</span>
                </div>
            </div>
        </div>

        <!-- 4. Confirmation -->
        <h3>4. Confirmation</h3>
        <div class="checkbox-row">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the <a href="#">Terms &amp; Conditions</a></label>
        </div>
        <button type="submit" class="submit-btn">
            <span class="btn-icon">✔</span> Sign me up!
        </button>

    </form>
</div>

<footer>
    © 2026 Malaysia Auto Store | Proton X50 Booking System
</footer>

</body>
</html>
