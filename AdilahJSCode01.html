<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Share Your Travels</title>

    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

    <style>
    body {
        margin: 0;
        background: #e5e5e5;
        font-family: Arial;
    }

    header {
        background: #3f51b5;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        margin: 0;
        font-family: 'Lobster', cursive;
        font-size: 30px;
    }

    .hamburger {
        font-size: 24px;
        cursor: pointer;
    }

    main {
        width: 60%;            
        max-width: 600px;      
        margin: 30px auto;     
        background: white;
        padding: 10px;         
        border: 1px solid #ccc;
        box-sizing: border-box;
        text-align: center;
    }

    #featured {
        position: relative;
        margin: 0;
        width: 100%;
        aspect-ratio: 16 / 9; 
        background-color: #eee;
        border: 4px solid #ddd;
        box-sizing: border-box;
        overflow: hidden;
    }

    #featured img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    #featured figcaption {
        position: absolute;
        bottom: 4px;
        left: 4px;
        right: 4px;
        background: rgba(255, 255, 255, 0.6);
        padding: 10px;
        font-size: 16px;
        color: #333;
        opacity: 1;
        box-sizing: border-box;
    }

    #thumbnails {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        gap: 5px;
    }

    #thumbnails img {
        width: 19%;
        aspect-ratio: 1 / 1; 
        cursor: pointer;
        border: 3px solid #ddd;
        object-fit: cover; 
        box-sizing: border-box;
        background-color: #eee;
    }

    #thumbnails img:hover {
        border: 3px solid #3f51b5;
    }
    </style>

</head>

<body>

<header>
    <h1>Share Your Travels</h1>
    <div class="hamburger">&#9776;</div>
</header>

<main>
    <figure id="featured">
        <img src="castle.jpg" title="Battle">
        <figcaption>Battle</figcaption>
    </figure>

    <section id="thumbnails">
        <img src="castle.jpg" title="Kellie Castle">
        <img src="vbridges.jpg" title="Victoria Bridge">
        <img src="pulau.jpg" title="Pulau Pangkor">
        <img src="lake.jpg" title="Taiping Lake Garden">
        <img src="ch.webp" title="Cameron Highland">
    </section>
</main>

<script>
window.addEventListener("load", function() {  

    var thumbs = document.getElementById("thumbnails");

    thumbs.addEventListener("click", function (e) {

        if (e.target.nodeName.toLowerCase() == 'img') {

            var clickedImageSource = e.target.src;

            var newSrc = clickedImageSource.replace("small", "medium");

            var featuredImage = document.querySelector("#featured img");

            featuredImage.src = newSrc;

            featuredImage.title = e.target.title;
        }

    });

    var featured = document.getElementById("featured");

    featured.addEventListener("mouseover", function () {

        var caption = document.querySelector("#featured figcaption");

        caption.style.transition = "opacity 1.5s";
        caption.style.opacity = 0.80;

        caption.innerHTML = document.querySelector("#featured img").title;

    });

    featured.addEventListener("mouseout", function () {

        var caption = document.querySelector("#featured figcaption");

        caption.style.transition = "opacity 1.5s";
        caption.style.opacity = 0;

    });

});
</script>

</body>
</html>
