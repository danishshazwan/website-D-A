<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F1 Fan Registration</title>

<style>

/* ===== BODY ===== */
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#e6e6e6;
    margin:0;
}

/* ===== CONTAINER ===== */
.container{
    width:700px;
    margin:40px auto;
    background:#f5f5f5;
    border:1px solid #999;
    padding:20px 30px;
}

/* ===== HEADER ===== */
.header{
    background:#666;
    color:white;
    text-align:center;
    font-size:26px;
    padding:10px;
    margin:-20px -30px 20px -30px;
    font-weight:bold;
}

/* ===== LABEL ===== */
label{
    display:block;
    margin-top:15px;
    font-size:14px;
}

/* ===== INPUT ===== */
input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #999;
    background:white;
    font-size:14px;
}

/* ===== FLEX ROW ===== */
.row{
    display:flex;
    gap:20px;
}

/* ===== SMALL INPUT ===== */
.small{
    width:120px;
}

/* ===== BOX (TYPE & CHECKBOX) ===== */
.box{
    border:1px solid #999;
    padding:10px;
    margin-top:15px;
    background:#fff;
}

/* ===== BUTTON AREA ===== */
.button-area{
    margin-top:20px;
    background:#ccc;
    padding:15px;
    text-align:center;
}

/* ===== BUTTON ===== */
button{
    padding:8px 20px;
    margin:5px;
    background:orange;
    border:1px solid #333;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ff9900;
}

/* ===== ERROR ===== */
.error{
    border:2px solid red;
    background:#ffd6d6;
}

/* ===== HIGHLIGHT ===== */
.highlight{
    background:#dbeafe;
}

</style>

</head>

<body>

<div class="container">

<div class="header">F1 Fan Registration</div>

<form id="mainForm">

<label>Full Name</label>
<input type="text" class="required hilightable">

<label>Email</label>
<input type="email" class="required hilightable">

<div class="row">

<div style="flex:1;">
<label>Favourite Driver</label>
<select class="required hilightable">
<option value="">Select Driver</option>
<option>Max Verstappen</option>
<option>Lewis Hamilton</option>
<option>Charles Leclerc</option>
<option>Lando Norris</option>
<option>Fernando Alonso</option>
</select>

<label>Country</label>
<select id="country" class="required hilightable">
<option value="">Select Country</option>
</select>

<label>Password</label>
<input type="password" class="required hilightable">

<label>Year</label>
<input type="text" class="required hilightable small">

</div>

<div style="flex:1;">

<div class="box">
<strong>Type</strong><br>
<input type="radio" name="type"> Casual Fan<br>
<input type="radio" name="type"> Hardcore Fan
</div>

<div class="box">
<strong>F1 Interests</strong><br>
<input type="checkbox"> Racing<br>
<input type="checkbox"> Strategy<br>
<input type="checkbox"> Drivers<br>
<input type="checkbox"> Teams
</div>

</div>

</div>

<label>Museum / Favorite Circuit</label>
<input type="text" class="hilightable">

<div class="button-area">
<button type="submit">Submit</button>
<button type="reset">Clear Form</button>
</div>

</form>

</div>

<script>

// ===== COUNTRY LIST =====
const countries = ["Malaysia","Singapore","Indonesia","Thailand","Japan","UK","USA","Australia"];

// check kosong
function isBlank(input){
    return input.value.trim() === "";
}

// buang error
function makeClean(el){
    el.classList.remove("error");
}

// load
window.addEventListener("load", function(){

    const countrySelect = document.getElementById("country");

    countries.forEach(c=>{
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        countrySelect.appendChild(opt);
    });

    // highlight
    document.querySelectorAll(".hilightable").forEach(input=>{
        input.addEventListener("focus", e=> e.target.classList.add("highlight"));
        input.addEventListener("blur", e=> e.target.classList.remove("highlight"));
    });

    // remove error bila ubah
    document.querySelectorAll(".required").forEach(input=>{
        input.addEventListener("change", e=> makeClean(e.target));
    });

    // validation
    document.getElementById("mainForm").addEventListener("submit", function(e){

        let valid = true;

        document.querySelectorAll(".required").forEach(input=>{
            if(isBlank(input)){
                input.classList.add("error");
                valid = false;
            }
        });

        if(!valid){
            e.preventDefault();
            alert("Please fill all required fields!");
        }

    });

});

</script>

</body>
</html>
