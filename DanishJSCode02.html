<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F1 Fan Registration Form</title>

<style>
/* --- Global --- */
body{
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #111827, #1e293b);
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

/* --- Container / Card --- */
.container{
  background:#1f2937;
  padding:40px 30px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border: 1px solid #ef4444;
  transition: transform 0.3s, box-shadow 0.3s;
}
.container:hover{
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* --- Header --- */
h1{
  text-align:center;
  color:#ef4444;
  margin-bottom:25px;
  font-size:28px;
  letter-spacing:1px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.4);
}

/* --- Labels & Inputs --- */
label{
  display:block;
  margin-top:15px;
  font-weight:500;
  font-size:0.95rem;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:5px;
  margin-bottom:10px;
  border:2px solid transparent;
  border-radius:8px;
  outline:none;
  font-size:0.95rem;
  background:#2d3748;
  color:white;
  transition: all 0.3s ease;
}
input::placeholder{
  color:#a0aec0;
}

/* highlight bila focus */
.highlight{
  background:#3b82f6;
  color:white;
  border-color:#3b82f6;
}

/* error style */
.error{
  border:2px solid #f87171;
  background:#fca5a5;
  color:#111;
}

/* --- Button --- */
button{
  width:100%;
  padding:12px;
  background:#ef4444;
  border:none;
  color:white;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
  font-weight:600;
  transition: all 0.3s ease;
}
button:hover{
  background:#dc2626;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* --- Responsive --- */
@media screen and (max-width:480px){
  .container{
    padding:30px 20px;
    width:95%;
  }
  h1{
    font-size:24px;
  }
  input, select, button{
    font-size:0.9rem;
    padding:10px;
  }
}
</style>

</head>

<body>

<div class="container">

<h1>F1 Fan Registration</h1>

<form id="mainForm">

<label>Full Name</label>
<input type="text" class="required hilightable">

<label>Email</label>
<input type="email" class="required hilightable">

<label>Favourite Driver</label>
<select class="required hilightable">
<option value="">Select Driver</option>
<option>Max Verstappen</option>
<option>Lewis Hamilton</option>
<option>Charles Leclerc</option>
<option>Lando Norris</option>
<option>Fernando Alonso</option>
</select>

<label>Country</label>
<select id="country" class="required hilightable">
<option value="">Select Country</option>
</select>

<label>Password</label>
<input type="password" class="required hilightable">

<button type="submit">Register</button>

</form>

</div>

<script>
// ================= JS GABUNG & TINGKAT =================

// Semua negara ISO list
const countries = [
"Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina",
"Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados",
"Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana",
"Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon",
"Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo",
"Costa Rica","Croatia","Cuba","Cyprus","Czechia","Denmark","Djibouti","Dominica","Dominican Republic",
"Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia",
"Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada",
"Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India",
"Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan",
"Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya",
"Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali",
"Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco",
"Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands",
"New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman",
"Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines",
"Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia",
"Saint Vincent and the Grenadines","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia",
"Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands",
"Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname",
"Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo",
"Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine",
"United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu",
"Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
];

// Determine if a field is blank 
function isBlank(inputField){ 
    return inputField.value.trim() === "";
}

// remove all error styles from the element passed in 
function makeClean(element){ 
    element.classList.remove("error");  
}

// Wait until the page is loaded
window.addEventListener("load", function() {     

    // Populate country dropdown
    const countrySelect = document.getElementById("country");
    countries.forEach(function(c){
        const option = document.createElement("option");
        option.value = c;
        option.textContent = c;
        countrySelect.appendChild(option);
    });

    // add highlight listeners
    var hilightableInputs = document.querySelectorAll(".hilightable"); 
    hilightableInputs.forEach(function(input){
        input.addEventListener("focus", function(e){ e.target.classList.add("highlight"); });
        input.addEventListener("blur", function(e){ e.target.classList.remove("highlight"); });
    });

    // remove error on change
    var requiredInputs = document.querySelectorAll(".required");   
    requiredInputs.forEach(function(input){
        input.addEventListener("change", function(e){ makeClean(e.target); });
    });

    // form submit validation
    var mainForm = document.getElementById("mainForm"); 
    mainForm.addEventListener("submit", function(e) { 

        var formValid = true;

        requiredInputs.forEach(function(input){
            if( isBlank(input) ){ 
                e.preventDefault(); 
                input.classList.add("error");
                formValid = false;
            } else {
                makeClean(input);
            }
        });

        if(!formValid){
            alert("Please fill all required fields.");
        }

    }); 

});
</script>

</body>
</html>
