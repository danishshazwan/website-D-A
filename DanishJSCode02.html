<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F1 Fan Registration</title>

<style>
body { font-family: Arial, sans-serif; background-color: #f7f7f7; padding-top: 50px; }

.outer-wrapper { width: 550px; margin: auto; position: relative; }

.form-title {
    background: #666; color: white; width: fit-content;
    padding: 5px 40px; margin: 0 auto; font-size: 1.3em;
    position: relative; top: 15px; z-index: 10;
}

.main-box {
    border: 1px solid #ccc; background: #fdfdfd;
    padding-top: 25px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}

label { display: block; margin: 10px 20px 2px 20px; font-size: 0.85em; }

input[type="text"], input[type="email"], input[type="password"], select {
    margin: 0 20px; width: calc(100% - 40px);
    border: 1px solid #999; padding: 5px;
}

.content-layout { display: flex; padding: 10px 20px; gap: 15px; }
.left-side { flex: 1.2; }
.right-side { flex: 1.8; }

.left-side input, .left-side select { margin: 0; width: 100%; }
.left-side label { margin: 8px 0 2px 0; }

fieldset { border: 1px solid #ccc; background: white; margin-bottom: 10px; font-size: 0.85em; padding:10px; }
.radio-label { display: inline; margin: 0; font-size: 1em; }

/* Validation */
.error {
    background-color: #ffcdd2 !important;
    border: 1px solid #b71c1c !important;
    background-image: url('https://cdn-icons-png.flaticon.com/16/753/753345.png'); 
    background-repeat: no-repeat;
    background-position: right 8px center;
}

.highlight { background-color: #fffde7 !important; }

.form-footer { background: #bbb; padding: 10px; text-align: center; margin-top: 20px; }

.btn-orange { 
    background: #ff9800; 
    border: 1px solid #333; 
    padding: 5px 20px; 
    font-weight: bold; 
    cursor: pointer; 
}
</style>

</head>

<body>

<div class="outer-wrapper">
    <h2 class="form-title">F1 Fan Registration</h2>
    
    <div class="main-box">
        <form id="mainForm">

            <label>Full Name</label>
            <input type="text" class="required hilightable">

            <label>Email</label>
            <input type="email" class="required hilightable">

            <div class="content-layout">

                <div class="left-side">

                    <label>Favourite Driver</label>
                    <select class="required hilightable">
                        <option value="">Select Driver</option>
                        <option>Max Verstappen</option>
                        <option>Lewis Hamilton</option>
                        <option>Charles Leclerc</option>
                        <option>Lando Norris</option>
                        <option>Fernando Alonso</option>
                    </select>

                    <label>Country</label>
                    <select id="country" class="required hilightable">
                        <option value="">Select Country</option>
                    </select>

                    <label>Password</label>
                    <input type="password" class="required hilightable">

                    <label>Year</label>
                    <input type="text" class="required hilightable">

                </div>

                <div class="right-side">

                    <fieldset>
                        <legend>Type</legend>
                        <input type="radio" name="type"> Casual Fan<br>
                        <input type="radio" name="type"> Hardcore Fan
                    </fieldset>

                    <fieldset>
                        <legend>F1 Interests</legend>
                        <input type="checkbox"> Racing<br>
                        <input type="checkbox"> Strategy<br>
                        <input type="checkbox"> Drivers<br>
                        <input type="checkbox"> Teams
                    </fieldset>

                </div>

            </div>

            <label>Favourite Circuit</label>
            <input type="text" class="hilightable">

            <div class="form-footer">
                <button type="submit" class="btn-orange">Submit</button>
                <button type="reset" class="btn-orange">Clear Form</button>
            </div>

        </form>
    </div>
</div>

<script>

// COUNTRY LIST
const countries = ["Malaysia","Singapore","Indonesia","Thailand","Japan","UK","USA","Australia"];

function isBlank(input){
    return input.value.trim() === "";
}

function makeClean(el){
    el.classList.remove("error");
}

window.addEventListener("load", function(){

    const countrySelect = document.getElementById("country");

    countries.forEach(c=>{
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        countrySelect.appendChild(opt);
    });

    document.querySelectorAll(".hilightable").forEach(input=>{
        input.addEventListener("focus", e=> e.target.classList.add("highlight"));
        input.addEventListener("blur", e=> e.target.classList.remove("highlight"));
    });

    document.querySelectorAll(".required").forEach(input=>{
        input.addEventListener("change", e=> makeClean(e.target));
    });

    document.getElementById("mainForm").addEventListener("submit", function(e){

        let valid = true;

        document.querySelectorAll(".required").forEach(input=>{
            if(isBlank(input)){
                input.classList.add("error");
                valid = false;
            }
        });

        if(!valid){
            e.preventDefault();
            alert("Please fill all required fields!");
        }

    });

});

</script>

</body>
</html>
